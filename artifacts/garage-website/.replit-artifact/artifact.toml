kind = "web"
previewPath = "/"
title = "GARAGE"
version = "1.0.0"
id = "artifacts/garage-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19609

[services.development]
run = "pnpm --filter @workspace/garage-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garage-website", "run", "build" ]
publicDir = "artifacts/garage-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19609"
BASE_PATH = "/"
