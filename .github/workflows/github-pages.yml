name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          PORT: 4173
          VITE_SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          VITE_SANITY_DATASET: ${{ vars.SANITY_DATASET || 'production' }}
        run: pnpm --filter @workspace/garage-website run build

      - name: Build Sanity Studio
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET || 'production' }}
          SANITY_STUDIO_BASEPATH: /${{ github.event.repository.name }}/studio
        run: pnpm --filter @workspace/garage-website run studio:build

      - name: Normalize Studio asset paths
        run: perl -pi -e 's#="/static/#="./static/#g' artifacts/garage-website/dist/public/studio/index.html

      - name: Support direct links
        run: pnpm --filter @workspace/garage-website run pages:routes

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/garage-website/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
